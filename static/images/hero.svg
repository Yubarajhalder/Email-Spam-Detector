<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circles -->
  <circle cx="300" cy="250" r="200" fill="url(#grad2)" opacity="0.5"/>
  <circle cx="300" cy="250" r="150" fill="url(#grad2)" opacity="0.3"/>

  <!-- Shield -->
  <path d="M300 80 L420 130 L420 250 C420 330 300 400 300 400 C300 400 180 330 180 250 L180 130 Z"
        fill="url(#grad1)" opacity="0.15" stroke="url(#grad1)" stroke-width="3"/>

  <!-- Email envelope -->
  <rect x="200" y="180" width="200" height="140" rx="12" fill="white" stroke="url(#grad1)" stroke-width="3" filter="url(#glow)"/>
  <path d="M200 195 L300 270 L400 195" stroke="url(#grad1)" stroke-width="3" fill="none"/>
  <line x1="200" y1="195" x2="300" y2="270" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="195" x2="300" y2="270" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>

  <!-- AI Brain icon -->
  <circle cx="300" cy="250" r="35" fill="url(#grad1)" opacity="0.9"/>
  <text x="300" y="258" text-anchor="middle" fill="white" font-size="28" font-family="Arial">AI</text>

  <!-- Scan lines -->
  <line x1="220" y1="230" x2="380" y2="230" stroke="#6366f1" stroke-width="2" opacity="0.4" stroke-dasharray="8,4">
    <animate attributeName="y1" values="210;290;210" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="210;290;210" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Floating particles -->
  <circle cx="150" cy="150" r="6" fill="#6366f1" opacity="0.6">
    <animate attributeName="cy" values="150;130;150" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="180" r="8" fill="#8b5cf6" opacity="0.5">
    <animate attributeName="cy" values="180;160;180" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="320" r="5" fill="#06b6d4" opacity="0.6">
    <animate attributeName="cy" values="320;300;320" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="300" r="7" fill="#6366f1" opacity="0.4">
    <animate attributeName="cy" values="300;280;300" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Status badges -->
  <rect x="380" y="160" width="80" height="30" rx="15" fill="#10b981" opacity="0.9"/>
  <text x="420" y="180" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">HAM</text>

  <rect x="140" y="340" width="80" height="30" rx="15" fill="#ef4444" opacity="0.9"/>
  <text x="180" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">SPAM</text>

  <!-- Connection lines -->
  <path d="M300 285 L420 175" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,4"/>
  <path d="M300 285 L180 355" stroke="#ef4444" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,4"/>
</svg>
